<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookify :: Order Details</title>
    <link rel="stylesheet" href="css/journal.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <div id="top"></div>

    <main role="main">
      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-2 mt-lg-0" id="sidebar">
            <!-- Sidebar will be injected via partials.js -->
          </div>

          <div class="col-lg-10">
            <div class="mt-5">
              <h4 class="mb-3">Order Details</h4>
              
              <p><strong>Name:</strong> <span id="orderName"></span></p>
              <p><strong>Order Date:</strong> <span id="orderDate"></span></p>
              <p><strong>Total:</strong> <span id="orderTotal"></span></p>

              <table class="table table-bordered mt-3">
                <thead class="thead-dark">
                  <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Price</th>
                    <th>Quantity</th>
                  </tr>
                </thead>
                <tbody id="orderDetailsTableBody"></tbody>
              </table>

              <a href="orders.html" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to Orders</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="bottom"></div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/partials.js"></script>
    <script src="js/order-details.js"></script>
  </body>
</html>
