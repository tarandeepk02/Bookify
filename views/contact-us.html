<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookify :: Read More, Explore More</title>
    <link rel="stylesheet" href="css/journal.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.15/dist/sweetalert2.all.min.js"></script>
    <style>
        .carousel-item img {
            height: 400px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div id="top">

    </div>
    <main>
        <div class="container">
            <div class="row mb-5 mt-5">
                <div class="col-md-6">
                    <div class="">
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="card">
                                    <div class="card-header bg-primary">
                                        <h3>Get in Touch</h3>
                                    </div>
                                    <div class="card-body">

                                        <div class="row">
                                            <div class="col-md-12">
                                                <iframe
                                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5211.425736394716!2d-123.11017652363732!3d49.22497227138424!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5486746f412563f7%3A0x36606d221509fdfe!2sLangara%20College!5e0!3m2!1sen!2sca!4v1744087971378!5m2!1sen!2sca"
                                                    width="100%" height="300" style="border:0;" allowfullscreen=""
                                                    loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                                            </div>
                                            <div class="col-md-12 mt-3">

                                                <h4>Email Us:</h4>
                                                <a href="mailto:taranbenipal02@gmail.com">info@bookify.ca</a>
                                                <h4 class="mt-4">Call Us:</h4>
                                                <a href="tel:9876543210">+1-604-xxx-xxxx</a>

                                            </div>
                                        </div>


                                    </div>
                                </div>

                            </div>

                        </div>
                    </div>


                </div>
                <div class="col-md-6">
                    <div class="">
                        <div class="card">
                            <div class="card-header bg-primary">
                                <h3>Contact Us</h3>
                            </div>
                            <div class="card-body">
                                <form method="post" action="/addQuery" id="contact-form">
                                    <div>
                                        <label for="name" class="form-label mt-4">Name<span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="name" placeholder="Enter your name" autocomplete="off">
                                        <span id="errorName" class="text-danger"></span>
                                    </div>
                                    <div>
                                        <label for="email" class="form-label mt-4">Email Id<span
                                                class="text-danger">*</span></label>
                                        <input type="email" class="form-control" id="email"
                                            placeholder="Enter your email" autocomplete="off">
                                        <span id="errorEmail" class="text-danger"></span>
                                    </div>
                                    <div>
                                        <label for="phone" class="form-label mt-4">Phone<span
                                                class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="phone"
                                            placeholder="Enter your phone" autocomplete="off">
                                        <span id="errorPhone" class="text-danger"></span>
                                    </div>
                                    <div>
                                        <label for="yourMessage" class="form-label mt-4">Your Message</label>
                                        <textarea class="form-control" id="yourMessage" rows="3"></textarea>
                                        <span id="errorYourMessage" class="text-danger"></span>
                                    </div>

                                    <div class="mt-4">
                                        <button type="submit" id="submitBtn"
                                            class="btn btn-lg btn-primary w-100">Send</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
    <div id="bottom"></div>
</body>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/partials.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.5.0/dist/sweetalert2.min.js"></script>
<script src="js/home.js"></script>
<script src="js/contact-us.js"></script>

</html>
