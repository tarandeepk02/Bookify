<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookify :: Read More, Explore More</title>
    <link rel="stylesheet" href="css/journal.min.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <style>
      .carousel-item img {
        height: 400px;
        object-fit: cover;
      }
      .carousel-control-prev-icon,
      .carousel-control-next-icon {
        background-color: rgba(0, 0, 0, 0.5);
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }
    </style>
  </head>

  <body>
    <div id="top"></div>

    <main role="main">
      <!-- CAROUSEL SLIDER -->
      <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 1"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 2"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 3"
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <!-- [2] Books Collection (from MongoDB) -->
      <div class="container my-2">
        <div class="text-center mb-4">
          <h2 class="text-center">Bookify Books</h2>
          <!-- <p class="lead">Crisp like a new sheet of paper</p> -->
        </div>
        <div id="bookCards" class="row">
          <!-- JS -->
        </div>

        <div class="text-center mt-4">
          <a href="books.html" class="btn btn-outline-primary">View All</a>
        </div>
      </div>

      <!-- [3] Google Books Carousel (from Open API) -->
      <div class="container my-2">
        <h2 class="mb-4 text-center">Google Books</h2>
        <div
          id="googleBooksCarousel"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner" id="googleBooksInner">
            <!-- JS slide-->
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#googleBooksCarousel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#googleBooksCarousel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>
    </main>

    <div id="bottom"></div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/home.js"></script>
    <script src="js/partials.js"></script>
  </body>
</html>
