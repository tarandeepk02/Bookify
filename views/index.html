<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookify :: Read More, Explore More</title>
    <link rel="stylesheet" href="css/journal.min.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <style>
      .carousel-item img {
        height: 400px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div id="top"></div>

    <main role="main">
      <!-- CAROUSEL SLIDER -->
      <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 1"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 2"
            />
          </div>
          <div class="carousel-item">
            <img
              src="https://placehold.co/1200x400"
              class="d-block w-100"
              alt="Book 3"
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <!-- BOOKS LIST (3 ITEMS PER ROW) -->
      <div class="container my-5">
        <div class="text-center">
          <h2 class="text-center">Books Collection</h2>
          <p class="lead">Crisp like a new sheet of paper</p>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="card">
              <img
                src="https://placehold.co/200x200"
                class="card-img-top"
                alt="Book 1"
              />
              <div class="card-body">
                <h5 class="card-title">Book Title 1</h5>
                <p class="card-text">Brief description of the book.</p>
                <a href="#" class="btn btn-primary">View Details</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                src="https://placehold.co/200x200"
                class="card-img-top"
                alt="Book 2"
              />
              <div class="card-body">
                <h5 class="card-title">Book Title 2</h5>
                <p class="card-text">Brief description of the book.</p>
                <a href="#" class="btn btn-primary">View Details</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                src="https://placehold.co/200x200"
                class="card-img-top"
                alt="Book 3"
              />
              <div class="card-body">
                <h5 class="card-title">Book Title 3</h5>
                <p class="card-text">Brief description of the book.</p>
                <a href="#" class="btn btn-primary">View Details</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="bottom"></div>

    <script src="js/bootstrap.bundle.min.js"></script>

    <script src="js/partials.js"></script>
  </body>
</html>
