<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookify :: Read More, Explore More</title>
  <link rel="stylesheet" href="css/journal.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />

</head>

<body>
  <div id="top"></div>
  <main class="container my-4">
    <div class="row">
      <div class="col-md-8">
        <div id="place-order">

        </div>
      </div>
      <div class="col-md-4">

        <div class="card">
          <div class="card-header">
            Your Information
          </div>
          <div class="card-body">


            <form>
              <fieldset>
                <div>
                  <label for="name" class="form-label">Your Name</label>

                  <input type="text" class="form-control" id="checkoutName" value="" autocomplete="off">
                  <span id="errorCheckoutName" class="text-danger"></span>

                </div>
                <div>
                  <label for="email" class="form-label mt-4">Your Email ID</label>
                  <input type="email" class="form-control" id="checkoutEmail" placeholder="" autocomplete="off">
                  <span id="errorCheckoutEmail" class="text-danger"></span>
                </div>
                <div>
                  <label for="shippingAddress" class="form-label mt-4">Your Shipping Address</label>
                  <textarea class="form-control" id="shippingAddress"></textarea>
                  <span id="errorShippingAddress" class="text-danger"></span>
                </div>
            </form>
          </div>
          <div class="card-footer">
            <button type="button" class="btn btn-lg btn-primary w-100" id="checkoutBtnn">Checkout</button>
          </div>
        </div>

      </div>


    </div>
  </main>
  <div id="bottom"></div>
</body>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/partials.js"></script>
<script src="js/place-order.js"></script>
<script src="js/home.js"></script>

</html>
