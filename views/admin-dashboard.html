<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookify :: Read More, Explore More</title>
  <link rel="stylesheet" href="css/journal.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />

</head>

<body>
  <div id="top"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-2 mt-lg-0" id="sidebar">

        </div>
        <div class="col-lg-10">
          <div class="mt-5">
            <h4>Welcome to Bookify!</h4>
            <div class="row justify-content-center mt-4">
              <div class="col-6 col-sm-4 col-lg-3">
                <div class="card shadow-sm mb-4">
                  <a href="users.html" class="text-decoration-none">
                    <div class="card-body text-center">
                      <i class="bi bi-people-fill text-primary" style="font-size: 2rem"></i>
                      <h5 class="font-weight-bold text-uppercase text-dark pt-2">
                        Users
                      </h5>
                    </div>
                  </a>
                </div>
              </div>

              <div class="col-6 col-sm-4 col-lg-3">
                <div class="card shadow-sm mb-4">
                  <a href="books.html" class="text-decoration-none">
                    <div class="card-body text-center">
                      <i class="bi bi-book-half text-primary" style="font-size: 2rem"></i>
                      <h5 class="font-weight-bold text-uppercase text-dark pt-2">
                        Books
                      </h5>
                    </div>
                  </a>
                </div>
              </div>

              <div class="col-6 col-sm-4 col-lg-3">
                <div class="card shadow-sm mb-4">
                  <a href="orders.html" class="text-decoration-none">
                    <div class="card-body text-center">
                      <i class="bi bi-cart-plus-fill text-primary" style="font-size: 2rem"></i>
                      <h5 class="font-weight-bold text-uppercase text-dark pt-2">
                        Orders
                      </h5>
                    </div>
                  </a>
                </div>
              </div>

              <div class="col-6 col-sm-4 col-lg-3">
                <div class="card shadow-sm mb-4">
                  <a href="password.html" class="text-decoration-none">
                    <div class="card-body text-center">
                      <i class="bi bi-file-earmark-lock2-fill text-primary" style="font-size: 2rem"></i>
                      <h5 class="font-weight-bold text-uppercase text-dark pt-2">
                        Security
                      </h5>
                    </div>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="bottom"></div>

  <script src="js/bootstrap.bundle.min.js"></script>

  <script src="js/partials.js"></script>
</body>

</html>
