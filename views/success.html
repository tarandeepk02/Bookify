<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookify :: Read More, Explore More</title>
  <link rel="stylesheet" href="css/journal.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
</head>

<body>
  <div id="top"></div>

  <main role="main">
    <div class="container">
      <section class="py-5 min-vh-100" id="about">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-md-12">
              <h2 class="mb-4 text-center">
                <span class="text-primary">Order Confirmation</span>
              </h2>
              <p class="lead text-muted text-center">
                Thank you for your order on <strong>Bookify</strong>!<br />
                Your books are being processed and will be delivered soon.<br />
                We appreciate your purchase. Happy reading!
              </p>


              <hr class="my-4" style="max-width: 400px; margin: auto;" />
              <p class="text-center">
                <strong><i class="bi bi-clock text-primary"></i> Order placed on:</strong>
                <span id="order-date" class="text-dark"></span>
              </p>

              <div class="text-center">
                <a href="/bookify-books.html" class="btn btn-outline-primary mt-2">
                  <i class="bi bi-gift-fill text-dark"></i> Explore More
                </a>
              </div>


            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="bottom"></div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/home.js"></script>
  <script src="js/partials.js"></script>

  <script>
    const now = new Date();
    const formatted = now.toLocaleString("en-CA", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    });
    document.getElementById("order-date").textContent = formatted;

  </script>
</body>

</html>
